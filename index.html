<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RecipeHub - تسجيل الدخول</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <h2>تسجيل الدخول - RecipeHub</h2>
        <!-- التوجيه عند الضغط على الزر سيكون إلى main.html -->
        <form id="loginForm" action="main.html" method="GET">
            <div class="form-group">
                <label for="email">البريد الإلكتروني:</label>
                <!-- type="email" للتحقق من وجود صيغة البريد الصحيحة -->
                <input type="email" id="email" name="email" required placeholder="أدخل البريد الإلكتروني">
            </div>
            
            <div class="form-group">
                <label for="password">كلمة المرور:</label>
                <!-- minlength="6" للتحقق من عدد الخانات -->
                <input type="password" id="password" name="password" minlength="6" required placeholder="أدخل كلمة المرور (6 خانات على الأقل)">
            </div>

            <button type="submit">تسجيل الدخول</button>
        </form>
    </div>

    <!-- ربط كود السكربت للتحقق عبر JavaScript -->
    <script src="js/script.js"></script>
</body>
</html>
